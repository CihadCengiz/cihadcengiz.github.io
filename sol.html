<html>
    <head>
        <title>Menü</title>
        <style>
            body {
              margin: 0;
            }
            
            ul {
              list-style-type: none;
              margin: 0;
              padding: 0;
              width: 100%;
              background-color: #f1f1f1;
              position: fixed;
              height: 100%;
              overflow: auto;
            }
            
            li a {
              display: block;
              color: #000;
              padding: 8px 16px;
              text-decoration: none;
              text-align: center;
            }
            
            li a.active {
              background-color: #04AA6D;
              color: white;
            }
            
            li a:hover:not(.active) {
              background-color: #555;
              color: white;
            }
            </style>
    </head>
    <body>
      <div id="menu">
        <ul>
          <li><a class="link active" href="ana.html" target="ana">Ana Sayfa</a></li>
          <li><a class="link" href="#news">Haberler</a></li>
          <li><a class="link" href="iletişim.html" target="ana">İletişim</a></li>
          <li><a class="link" href="#about">Hakkımızda</a></li>
          <li><a class="link" href="https://cihadcengiz.com/" target="ana">Portfolio</a></li>
        </ul>
      </div>
    </body>
    <script>
        let header = document.getElementById("menu");
        let links = header.getElementsByClassName("link");
        
        for (let i = 0; i < links.length; i++) {
          links[i].addEventListener("click", function() {
            let current = document.getElementsByClassName("active");
            current[0].className = current[0].className.replace(" active", "");
            this.className += " active";
          });
        }
        </script>
</html>
